services:
  api:
    build: .
    container_name: pdf_ocr_api
    ports:
      - "8000:8000"
    restart: always # se o container cair, ele reinicia automaticamente
    volumes:
      - ./src:/app/src # Opcional: compartilha sua pasta src com o container (útil para desenvolvimento)
    environment:
      - TZ=America/Sao_Paulo
